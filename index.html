<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styled Name Card</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #4b0082, #000000);
            font-family: Arial, sans-serif;
        }
        .card {
            text-align: center;
            padding: 20px;
            background: #000000;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
            width: 80%;
            max-width: 600px;
        }
        .card h1 {
            color: #ee82ee;
            margin: 0;
        }
        .card p {
            color: #dda0dd;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Name</h1>
        <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
    </div>
</body>
</html>
